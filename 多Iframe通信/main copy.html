<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多Iframe通信桥 - 主页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .main-panel {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .main-panel h2 {
            color: #333;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .iframe-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .iframe-wrapper {
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .iframe-wrapper h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .iframe-wrapper h3::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            margin-left: auto;
        }

        .status-connected {
            background: #e7f3ff;
            color: #0066cc;
        }

        .status-disconnected {
            background: #ffe7e7;
            color: #cc0000;
        }

        iframe {
            width: 100%;
            height: 200px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            transition: border-color 0.3s ease;
        }

        iframe:hover {
            border-color: #667eea;
        }

        .console-log {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 20px;
        }

        .console-log::-webkit-scrollbar {
            width: 8px;
        }

        .console-log::-webkit-scrollbar-track {
            background: #2d2d2d;
        }

        .console-log::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 4px;
        }

        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid #333;
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-time {
            color: #888;
            margin-right: 10px;
        }

        .log-source {
            color: #4ec9b0;
            font-weight: bold;
        }

        .log-message {
            color: #d4d4d4;
        }

        .clear-btn {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        @media (max-width: 1024px) {
            .iframe-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌉 多Iframe通信桥演示</h1>

        <div class="main-panel">
            <h2>🎛️ 主页面控制面板</h2>
            <div class="button-group">
                <button class="btn-primary" onclick="sendToIframe1()">
                    发送消息到 Iframe 1
                </button>
                <button class="btn-primary" onclick="sendToIframe2()">
                    发送消息到 Iframe 2
                </button>
                <button class="btn-primary" onclick="sendToIframe3()">
                    发送消息到 Iframe 3
                </button>
                <button class="btn-secondary" onclick="broadcastToAll()">
                    广播到所有 Iframe
                </button>
                <button class="btn-secondary" onclick="clearLog()">
                    清空日志
                </button>
            </div>
        </div>

        <div class="iframe-container">
            <div class="iframe-wrapper">
                <h3>
                    Iframe 1
                    <span id="status-1" class="status-badge status-disconnected">未连接</span>
                </h3>
                <iframe id="iframe1" src="iframe1.html"></iframe>
            </div>

            <div class="iframe-wrapper">
                <h3>
                    Iframe 2
                    <span id="status-2" class="status-badge status-disconnected">未连接</span>
                </h3>
                <iframe id="iframe2" src="iframe2.html"></iframe>
            </div>

            <div class="iframe-wrapper">
                <h3>
                    Iframe 3
                    <span id="status-3" class="status-badge status-disconnected">未连接</span>
                </h3>
                <iframe id="iframe3" src="iframe3.html"></iframe>
            </div>
        </div>

        <div class="main-panel" style="position: relative;">
            <h2>📋 消息日志</h2>
            <button class="btn-secondary clear-btn" onclick="clearLog()">清空</button>
            <div class="console-log" id="console-log"></div>
        </div>
    </div>

    <script src="message-bridge.js"></script>
    <script src="main.js"></script>
</body>
</html>
